name: CI — Test, Lint, Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend Tests ──────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: frontend
          directory: apps/frontend/coverage

  # ─── Backend Tests ───────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Format check with black
        run: black --check src/

      - name: Import sort check
        run: isort --check-only src/

      - name: Run tests
        run: pytest --cov=src --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: backend
          directory: apps/backend

  # ─── AI Engine Tests ─────────────────────────────────────────────────────────
  test-ai-engine:
    name: AI Engine Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 . --max-line-length=120 --extend-ignore=E203,W503 --exclude=__pycache__

  # ─── Security Scan — Container Images ────────────────────────────────────────
  security-scan-images:
    name: Security Scan — Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, ai-engine, self-healing-operator]
        include:
          - service: frontend
            context: apps/frontend
          - service: backend
            context: apps/backend
          - service: ai-engine
            context: ai-engine
          - service: self-healing-operator
            context: self-healing-operator
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t infragpt-${{ matrix.service }}:scan ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "infragpt-${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

  # ─── Security Scan — Terraform ────────────────────────────────────────────────
  security-scan-terraform:
    name: Security Scan — Terraform IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
          soft_fail: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

  # ─── Security Scan — Kubernetes Manifests ────────────────────────────────────
  security-scan-k8s:
    name: Security Scan — Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on K8s manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "k8s/"
          format: "sarif"
          output: "trivy-k8s.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

  # ─── Validate Kubernetes Manifests ───────────────────────────────────────────
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate base manifests
        run: |
          find k8s/base -name "*.yaml" -not -name "kustomization.yaml" | \
            kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.29.0

      - name: Validate Kustomize overlays
        run: |
          for overlay in k8s/overlays/*/; do
            echo "Validating overlay: $overlay"
            kubectl kustomize "$overlay/sample-app" 2>/dev/null | \
              kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.29.0 || true
          done

  # ─── Terraform Validate ───────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [vpc, eks-cluster, rds]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/${{ matrix.module }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/${{ matrix.module }}
