name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Frontend Tests ────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      # npm install (not ci) — no lock file needed
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --forceExit --passWithNoTests

  # ── 2. Backend Tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: flake8 src/ --max-line-length=130 --extend-ignore=E203,W503

      - name: Test
        run: pytest -v --tb=short -p no:warnings

  # ── 3. AI Engine Lint ────────────────────────────────────────────────────────
  test-ai-engine:
    name: AI Engine Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 . --max-line-length=130 --extend-ignore=E203,W503 --exclude=__pycache__

  # ── 4. Security Scan — Docker Images ─────────────────────────────────────────
  security-scan-images:
    name: Security Scan — Docker Images (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: apps/frontend
          - service: backend
            context: apps/backend
          - service: ai-engine
            context: ai-engine
          - service: self-healing-operator
            context: self-healing-operator
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t infragpt-${{ matrix.service }}:scan ${{ matrix.context }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: infragpt-${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # report-only, never fail the build
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── 5. Security Scan — Terraform IaC ─────────────────────────────────────────
  security-scan-terraform:
    name: Security Scan — Terraform IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
          soft_fail: true          # never fail the build
        continue-on-error: true

      - name: Ensure SARIF exists
        run: |
          [ -f checkov-terraform.sarif ] || \
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' \
            > checkov-terraform.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

  # ── 6. Security Scan — Kubernetes Manifests ──────────────────────────────────
  security-scan-k8s:
    name: Security Scan — Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: k8s/
          format: sarif
          output: trivy-k8s.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"           # report-only
        continue-on-error: true

      - name: Ensure SARIF exists
        run: |
          [ -f trivy-k8s.sarif ] || \
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' \
            > trivy-k8s.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

  # ── 7. Validate Kubernetes Manifests ─────────────────────────────────────────
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate standard K8s resources
        # Skip CRDs, Kyverno policies, Prometheus rules, and HealingPolicy
        # resources — kubeconform has no schemas for those custom types
        run: |
          find k8s/base -name "*.yaml" \
            ! -name "kustomization.yaml" \
            ! -path "*/crds/*" \
            ! -path "*/policies/*" \
            ! -path "*/healing-policies/*" \
            ! -path "*/prometheus/*" \
            ! -path "*/grafana/*" \
            | xargs kubeconform \
                -strict \
                -ignore-missing-schemas \
                -kubernetes-version 1.29.0 \
                -skip HealingPolicy,ClusterPolicy,PrometheusRule,AppProject,Application \
                -summary

      - uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Kustomize build overlays
        run: |
          for dir in k8s/overlays/local/sample-app \
                     k8s/overlays/production/sample-app \
                     k8s/overlays/staging/sample-app; do
            echo "==> Building $dir"
            kubectl kustomize "$dir" > /dev/null && echo "OK" || true
          done

  # ── 8. Terraform Validate ─────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [vpc, eks-cluster, rds]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: terraform/${{ matrix.module }}
        continue-on-error: true   # format issues are warnings, not blockers

      - name: terraform init
        run: terraform init -backend=false -input=false
        working-directory: terraform/${{ matrix.module }}

      - name: terraform validate
        run: terraform validate -no-color
        working-directory: terraform/${{ matrix.module }}
