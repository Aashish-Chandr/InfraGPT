name: Build and Push — Docker Images + Update Manifests

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "ai-engine/**"
      - "self-healing-operator/**"

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/infragpt

jobs:
  # ─── Detect Changed Services ─────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      ai-engine: ${{ steps.changes.outputs.ai-engine }}
      operator: ${{ steps.changes.outputs.operator }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            backend:
              - 'apps/backend/**'
            ai-engine:
              - 'ai-engine/**'
            operator:
              - 'self-healing-operator/**'

  # ─── Build and Push ───────────────────────────────────────────────────────────
  build-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - service: frontend
            context: apps/frontend
            image: infragpt-frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}
          - service: backend
            context: apps/backend
            image: infragpt-backend
            changed: ${{ needs.detect-changes.outputs.backend }}
          - service: ai-engine
            context: ai-engine
            image: infragpt-ai-engine
            changed: ${{ needs.detect-changes.outputs.ai-engine }}
          - service: operator
            context: self-healing-operator
            image: infragpt-operator
            changed: ${{ needs.detect-changes.outputs.operator }}
    if: ${{ matrix.changed == 'true' }}
    permissions:
      contents: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Run Trivy on pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-result.sarif"
          severity: "CRITICAL"
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-result.sarif

  # ─── Update Kubernetes Manifests ─────────────────────────────────────────────
  update-manifests:
    name: Update Image Tags in Manifests
    runs-on: ubuntu-latest
    needs: build-push
    if: always() && needs.build-push.result != 'failure'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd k8s/overlays/production/sample-app

          # Update frontend image tag
          if [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ]; then
            kustomize edit set image \
              ${{ secrets.DOCKERHUB_USERNAME }}/infragpt-frontend=${{ secrets.DOCKERHUB_USERNAME }}/infragpt-frontend:${SHORT_SHA}
            echo "Updated frontend to ${SHORT_SHA}"
          fi

          # Update backend image tag
          if [ "${{ needs.detect-changes.outputs.backend }}" == "true" ]; then
            kustomize edit set image \
              ${{ secrets.DOCKERHUB_USERNAME }}/infragpt-backend=${{ secrets.DOCKERHUB_USERNAME }}/infragpt-backend:${SHORT_SHA}
            echo "Updated backend to ${SHORT_SHA}"
          fi

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}

          Services updated:
          - frontend: ${{ needs.detect-changes.outputs.frontend }}
          - backend: ${{ needs.detect-changes.outputs.backend }}
          - ai-engine: ${{ needs.detect-changes.outputs.ai-engine }}
          - operator: ${{ needs.detect-changes.outputs.operator }}

          [skip ci]"
          git push
