apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infragpt-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: infragpt
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infragpt
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "57.0.3"
    helm:
      releaseName: kube-prometheus-stack
      valueFiles:
        - $values/k8s/base/monitoring/values.yaml
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "57.0.3"
      helm:
        releaseName: kube-prometheus-stack
    - repoURL: https://github.com/your-org/infragpt.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
