apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infragpt-sample-app
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: infragpt
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infragpt
  source:
    repoURL: https://github.com/your-org/infragpt.git
    targetRevision: HEAD
    path: k8s/overlays/production/sample-app
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
