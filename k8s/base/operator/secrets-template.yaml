# DO NOT COMMIT WITH REAL VALUES
# Create this secret manually:
#   kubectl create secret generic infragpt-secrets \
#     --namespace infragpt-system \
#     --from-literal=slack-webhook-url='https://hooks.slack.com/...' \
#     --from-literal=anthropic-api-key='sk-ant-...' \
#     --from-literal=database-url='postgresql://...'
#
# Or use Vault Agent Injector (recommended for production)
apiVersion: v1
kind: Secret
metadata:
  name: infragpt-secrets
  namespace: infragpt-system
type: Opaque
stringData:
  slack-webhook-url: "REPLACE_WITH_REAL_VALUE"
  anthropic-api-key: "REPLACE_WITH_REAL_VALUE"
  database-url: "REPLACE_WITH_REAL_VALUE"
