apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/sample-app

namespace: staging

images:
  - name: your-dockerhub-username/infragpt-frontend
    newTag: latest
  - name: your-dockerhub-username/infragpt-backend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Namespace
      name: production
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging
