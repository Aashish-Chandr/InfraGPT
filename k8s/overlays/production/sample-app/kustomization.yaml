apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/sample-app

# Production image tags are updated by CI/CD pipeline
images:
  - name: your-dockerhub-username/infragpt-frontend
    newTag: latest
  - name: your-dockerhub-username/infragpt-backend
    newTag: latest

# Production-specific patches
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
