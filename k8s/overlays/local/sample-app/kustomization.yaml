apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/sample-app

# Override image tags for local development
images:
  - name: your-dockerhub-username/infragpt-frontend
    newTag: latest
  - name: your-dockerhub-username/infragpt-backend
    newTag: latest

# Reduce replicas for local development
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Remove Vault annotations for local dev
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: remove
        path: /spec/template/metadata/annotations/vault.hashicorp.com~1agent-inject
      - op: remove
        path: /spec/template/metadata/annotations/vault.hashicorp.com~1role
      - op: remove
        path: /spec/template/metadata/annotations/vault.hashicorp.com~1agent-inject-secret-database
      - op: remove
        path: /spec/template/metadata/annotations/vault.hashicorp.com~1agent-inject-template-database
  # Add local DATABASE_URL env var
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DATABASE_URL
          value: "postgresql+asyncpg://infragpt_admin:password@postgres:5432/infragpt"
